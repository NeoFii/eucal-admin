services:
  admin:
    build:
      context: .
      args:
        API_URL: ${API_URL:-http://host.docker.internal:8001}
    ports:
      - "${PORT:-3001}:3001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/login"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
